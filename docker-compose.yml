services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["127.0.0.1:5432:5432"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redisdata:/data]
    ports: ["127.0.0.1:6379:6379"]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      RECORDINGS_DIR: /var/lib/debates/recordings
    env_file: .env
    volumes:
      - recordings:/var/lib/debates/recordings
    ports: ["127.0.0.1:3000:3000"]
    restart: unless-stopped

  discord-bot:
    build:
      context: .
      dockerfile: packages/discord-bot/Dockerfile
    depends_on: [api, redis]
    environment:
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:3000
      RECORDINGS_DIR: /var/lib/debates/recordings
    env_file: .env
    volumes:
      - recordings:/var/lib/debates/recordings        # same volume as api (spec §9)
    restart: unless-stopped

  # Run-once tool (profile `tools`, not started by `up`). Transcribes a session:
  #   docker compose run --rm transcriber <session-dir-name>
  # Local dev (api/bot native, files in host /tmp/debates-recordings):
  #   RECORDINGS_SOURCE=/tmp/debates-recordings docker compose run --rm transcriber <dir>
  transcriber:
    build:
      context: packages/transcriber
      dockerfile: Dockerfile
    profiles: ["tools"]
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ru}
      RECORDINGS_DIR: /recordings
      WHISPER_DOWNLOAD_ROOT: /models
      HF_HOME: /models
    volumes:
      - ${RECORDINGS_SOURCE:-recordings}:/recordings   # named volume (prod) or host bind (dev)
      - whisper-models:/models                         # ~3GB large-v3, downloaded once

volumes:
  pgdata:
  redisdata:
  recordings:
  whisper-models:
